version: "3.9"

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    depends_on:
      - db


  redis:
    image: redis:alpine



  celery:
    build: .
    command: celery -A config worker -l info
    depends_on:
      - db



  celery-beat:
    build: .
    command: celery -A config beat -l info
    depends_on:
      - db


